<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Ensures proper scaling on mobile; required for predictable responsive behaviour -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>📘 Guided Project Live Demos</title>

  <style>
    body {
      margin:0;
      font-family: "Segoe UI", Roboto, sans-serif;
      background:#0d1117;
      color:#e6edf3;
      padding:2rem;
      display:flex;
      flex-direction:column;
      align-items:center; /* Centers the main content without extra wrappers */
    }

    h1 {
      text-align:center;
      color:#9ccfd8;
      margin-bottom:0.5rem;
    }

    p {
      text-align:center;
      color:#c9d1d9;
      margin-bottom:2rem;
      max-width:650px; /* Prevents overly wide text blocks on large screens */
      line-height:1.5;
    }

    /* Single centred panel: chosen over flex layouts since only one table is present */
    .panel {
      width:100%;
      max-width:500px;  /* Keeps table readable on desktop */
      min-width:280px;  /* Prevents collapse on small devices */
      background:#161b22;
      border:1px solid #30363d;
      border-radius:6px;
      padding:0.75rem;
      font-size:0.8rem;
    }

    .panel h2 {
      margin:0.3rem 0 0.6rem;
      color:#9ccfd8;
      font-size:1rem;
      text-align:center;
    }

    table {
      border-collapse:collapse;
      width:100%; /* Allows natural fluid scaling */
      font-size:0.8rem;
    }

    th, td {
      padding:0.4rem 0.5rem;
      text-align:left;
      border-bottom:1px solid #30363d;
    }

    th {
      background:#1f2937;
      color:#9ccfd8;
      /* Header styling kept subtle to match the dark theme */
    }

    tr:hover {
      background:#1e2a34; /* Light hover feedback without breaking theme contrast */
    }

    a {
      color:#9ccfd8;
      text-decoration:none;
      font-weight:500;
    }

    a:hover {
      text-decoration:underline;
    }
  </style>
</head>

<body>
